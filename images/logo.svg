<svg width="80" height="50" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mvGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#00889e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#00a8cc;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- MV Logo with intertwined letters -->
  <g>
    <!-- Left vertical of M (darker teal-blue) -->
    <rect x="5" y="12" width="6" height="28" rx="3" fill="url(#mvGradient)"/>
    
    <!-- Center V shape of M (darker teal) -->
    <path d="M 8 12 L 20 35 L 32 12" 
          fill="none" 
          stroke="url(#mvGradient)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Right stroke of M / Left stroke of V (medium blue, intertwined) -->
    <rect x="29" y="12" width="6" height="28" rx="3" fill="url(#mvGradient)"/>
    
    <!-- V shape (lighter cyan-green) -->
    <path d="M 32 12 L 45 38 L 58 12" 
          fill="none" 
          stroke="url(#mvGradient)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.95"/>
    
    <!-- Connecting ribbon effect -->
    <ellipse cx="32" cy="12" rx="5" ry="3" fill="url(#mvGradient)" opacity="0.3"/>
  </g>
</svg>
